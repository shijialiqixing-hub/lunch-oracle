<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lunch Oracle" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <title>Lunch Oracle 午餐神諭</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0F0F0F;
      --surface: #1A1A1A;
      --surface-elevated: #242424;
      --primary: #FF6B35;
      --primary-dim: rgba(255, 107, 53, 0.15);
      --primary-glow: rgba(255, 107, 53, 0.4);
      --secondary: #00D9A5;
      --gold: #FFD700;
      --gold-dim: rgba(255, 215, 0, 0.15);
      --purple: #9B6DFF;
      --purple-dim: rgba(155, 109, 255, 0.15);
      --text-primary: #FFFFFF;
      --text-secondary: #A3A3A3;
      --text-muted: #737373;
      --border: #2D2D2D;
      --border-light: #3D3D3D;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 28px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: 'Outfit', 'Noto Sans TC', 'Noto Sans SC', 'Noto Sans JP', 'Noto Sans KR', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    #app { position: relative; width: 100%; min-height: 100vh; overflow: hidden; }

    .screen {
      position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh;
      transform: translateX(100%); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
      pointer-events: none; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: 40px;
    }
    .screen.active { position: relative; transform: translateX(0); opacity: 1; pointer-events: auto; }

    /* === LANGUAGE SWITCHER === */
    .lang-bar {
      display: flex; justify-content: center; gap: 6px;
      padding: 16px 16px 0; flex-wrap: wrap;
    }
    .lang-btn {
      padding: 6px 10px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 13px;
      cursor: pointer; touch-action: manipulation;
      font-family: inherit; transition: all 0.2s ease;
      white-space: nowrap;
    }
    .lang-btn.active {
      background: var(--primary-dim); border-color: var(--primary);
      color: var(--primary); font-weight: 600;
    }
    .lang-btn:active { transform: scale(0.95); }

    /* === HOME SCREEN === */
    .home-header { padding: 16px 20px 8px; text-align: center; }
    .home-header h1 { font-size: 28px; font-weight: 800; margin-bottom: 4px; }
    .home-header .subtitle { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

    .fortune-banner {
      margin: 16px 16px 0;
      background: linear-gradient(135deg, rgba(155, 109, 255, 0.12), rgba(255, 215, 0, 0.10));
      border: 1px solid rgba(155, 109, 255, 0.25);
      border-radius: var(--radius-xl); padding: 18px;
      text-align: center; position: relative; overflow: hidden;
    }
    .fortune-banner::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(155, 109, 255, 0.08), transparent 70%);
      pointer-events: none;
    }
    .fortune-banner .element-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 8px; }
    .fortune-banner .element-emoji { font-size: 26px; }
    .fortune-banner .element-name { font-size: 16px; font-weight: 700; color: var(--gold); }
    .fortune-banner .fortune-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .fortune-banner .fortune-stars { margin-top: 8px; font-size: 16px; letter-spacing: 2px; }
    .fortune-banner .fortune-stars .star-filled { color: var(--gold); }
    .fortune-banner .fortune-stars .star-empty { color: var(--border-light); }
    .fortune-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    .draw-section { padding: 20px 16px 12px; text-align: center; }
    .draw-btn {
      width: 100%; padding: 18px 24px;
      background: linear-gradient(135deg, var(--primary), #FF8F35);
      border: none; border-radius: var(--radius-xl);
      color: #fff; font-size: 19px; font-weight: 800;
      font-family: inherit; cursor: pointer; touch-action: manipulation;
      transition: transform 0.1s ease;
      box-shadow: 0 4px 24px var(--primary-glow);
      animation: btnPulse 2.5s ease-in-out infinite;
    }
    .draw-btn:active { transform: scale(0.97); animation: none; }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 24px var(--primary-glow); }
      50% { box-shadow: 0 4px 40px rgba(255, 107, 53, 0.6); }
    }
    .pick-yourself-link {
      display: block; margin-top: 14px; font-size: 13px; color: var(--text-muted);
      text-decoration: none; cursor: pointer; background: none; border: none; font-family: inherit;
    }

    .section-divider {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 20px 12px; color: var(--text-muted); font-size: 12px;
      text-transform: uppercase; letter-spacing: 1px;
    }
    .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 32px; }
    .category-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 14px 6px;
      text-align: center; cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease;
      touch-action: manipulation; min-height: 90px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    }
    .category-card:active { transform: scale(0.95); background: var(--surface-elevated); }
    .category-card .emoji { font-size: 32px; line-height: 1; }
    .category-card .cat-name { font-size: 13px; font-weight: 600; }
    .category-card .cat-sub { font-size: 10px; color: var(--text-muted); }

    /* === DIVINATION === */
    .divine-screen { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .divine-circle {
      width: 200px; height: 200px; border-radius: 50%;
      border: 2px solid rgba(155, 109, 255, 0.3);
      display: flex; align-items: center; justify-content: center;
      position: relative; animation: circleGlow 2s ease-in-out infinite;
    }
    @keyframes circleGlow {
      0%, 100% { border-color: rgba(155, 109, 255, 0.3); box-shadow: 0 0 30px rgba(155, 109, 255, 0.1); }
      50% { border-color: rgba(155, 109, 255, 0.6); box-shadow: 0 0 60px rgba(155, 109, 255, 0.25); }
    }
    .divine-circle::before {
      content: '☯'; position: absolute; font-size: 180px; color: rgba(155, 109, 255, 0.06);
      animation: yinYangSpin 8s linear infinite;
    }
    @keyframes yinYangSpin { to { transform: rotate(360deg); } }
    .slot-emoji { font-size: 72px; z-index: 2; transition: filter 0.1s ease; }
    .slot-emoji.spinning { filter: blur(4px); }
    .divine-message { margin-top: 28px; font-size: 16px; font-weight: 600; color: var(--purple); text-align: center; min-height: 24px; }
    .divine-sub { margin-top: 8px; font-size: 12px; color: var(--text-muted); }

    /* === RESULT === */
    .result-content { padding: 0 16px; }
    .tarot-card {
      background: linear-gradient(160deg, #1E1E2E, #1A1A2A);
      border: 1px solid rgba(155, 109, 255, 0.3);
      border-radius: var(--radius-2xl); padding: 24px 18px;
      margin: 16px 0; text-align: center;
      position: relative; overflow: hidden;
      transform-style: preserve-3d;
      animation: cardReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes cardReveal {
      0% { transform: perspective(800px) rotateY(90deg); opacity: 0; }
      100% { transform: perspective(800px) rotateY(0deg); opacity: 1; }
    }
    .tarot-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(255, 215, 0, 0.06), transparent 60%);
      pointer-events: none;
    }
    .tarot-card .card-label { font-size: 11px; color: var(--purple); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 14px; font-weight: 600; }
    .tarot-card .card-emoji { font-size: 60px; margin-bottom: 10px; }
    .tarot-card .card-dish-primary { font-size: 24px; font-weight: 900; }
    .tarot-card .card-dish-secondary { font-size: 14px; color: var(--text-secondary); margin-top: 4px; }
    .tarot-card .card-category { font-size: 13px; color: var(--text-muted); margin-top: 2px; }
    .divination-copy { margin-top: 18px; padding: 14px 16px; background: var(--purple-dim); border-radius: var(--radius-md); font-size: 14px; line-height: 1.6; color: #C9B8FF; }
    .element-badge { display: inline-flex; align-items: center; gap: 6px; margin-top: 14px; padding: 6px 14px; background: var(--gold-dim); border: 1px solid rgba(255, 215, 0, 0.25); border-radius: 20px; font-size: 12px; color: var(--gold); font-weight: 600; }
    .fortune-score { margin-top: 10px; font-size: 14px; color: var(--text-muted); }
    .fortune-score .star-filled { color: var(--gold); font-size: 18px; }
    .fortune-score .star-empty { color: var(--border-light); font-size: 18px; }

    .result-actions { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
    .btn-accept { width: 100%; padding: 16px; background: var(--secondary); border: none; border-radius: var(--radius-lg); color: #000; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: transform 0.1s ease; }
    .btn-accept:active { transform: scale(0.98); }
    .btn-redraw { width: 100%; padding: 14px; background: var(--primary-dim); border: 1px solid var(--primary); border-radius: var(--radius-lg); color: var(--primary); font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: transform 0.1s ease; }
    .btn-redraw:active { transform: scale(0.98); }
    .btn-row { display: flex; gap: 10px; }
    .btn-share { flex: 1; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-secondary); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: background 0.2s ease; }
    .btn-share:active { background: var(--surface-elevated); }
    .btn-browse { flex: 1; padding: 14px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-muted); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; }

    /* === DISH SCREEN === */
    .screen-header { display: flex; align-items: center; gap: 12px; padding: 20px 16px 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 1px solid var(--border); }
    .back-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 14px; padding: 8px 12px; cursor: pointer; touch-action: manipulation; font-family: inherit; transition: background 0.2s ease; }
    .back-btn:active { background: var(--surface-elevated); }
    .screen-header h2 { font-size: 20px; font-weight: 600; flex: 1; }
    .just-category-btn { display: block; width: calc(100% - 32px); margin: 16px auto 8px; padding: 14px 16px; background: var(--primary-dim); border: 1px solid var(--primary); border-radius: var(--radius-md); color: var(--primary); font-size: 16px; font-weight: 600; font-family: inherit; cursor: pointer; touch-action: manipulation; text-align: center; transition: transform 0.1s ease; }
    .just-category-btn:active { transform: scale(0.98); }
    .dish-divider { padding: 12px 20px 8px; font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }
    .dish-list { padding: 0 16px 32px; }
    .dish-card { display: flex; align-items: center; gap: 14px; padding: 14px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-md); margin-bottom: 8px; cursor: pointer; touch-action: manipulation; transition: transform 0.1s ease, background 0.2s ease; }
    .dish-card:active { transform: scale(0.98); background: var(--surface-elevated); }
    .dish-card .dish-names { flex: 1; }
    .dish-card .dish-primary { font-size: 16px; font-weight: 600; }
    .dish-card .dish-secondary { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
    .dish-card .dish-arrow { color: var(--text-muted); font-size: 18px; }

    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface-elevated); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 12px 24px; font-size: 14px; color: var(--secondary); font-weight: 600; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; z-index: 100; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <section id="screen-home" class="screen active">
      <div id="lang-bar" class="lang-bar"></div>
      <header class="home-header">
        <h1 id="home-title"></h1>
        <div id="home-subtitle" class="subtitle"></div>
      </header>
      <div id="fortune-banner" class="fortune-banner"></div>
      <div class="draw-section">
        <button id="btn-draw" class="draw-btn"></button>
        <button id="btn-pick-yourself" class="pick-yourself-link"></button>
      </div>
      <div id="section-divider" class="section-divider"></div>
      <div id="category-grid" class="category-grid"></div>
    </section>

    <section id="screen-divine" class="screen divine-screen">
      <div class="divine-circle">
        <div id="slot-emoji" class="slot-emoji">🔮</div>
      </div>
      <div id="divine-message" class="divine-message"></div>
      <div id="divine-sub" class="divine-sub"></div>
    </section>

    <section id="screen-result" class="screen">
      <div class="result-content">
        <div id="tarot-card" class="tarot-card"></div>
        <div class="result-actions">
          <button id="btn-accept" class="btn-accept"></button>
          <button id="btn-redraw" class="btn-redraw"></button>
          <div class="btn-row">
            <button id="btn-share" class="btn-share"></button>
            <button id="btn-browse" class="btn-browse"></button>
          </div>
        </div>
      </div>
    </section>

    <section id="screen-dishes" class="screen">
      <div class="screen-header">
        <button id="btn-back-home" class="back-btn"></button>
        <h2 id="dish-header-title"></h2>
      </div>
      <button id="btn-just-category" class="just-category-btn"></button>
      <div id="dish-divider-text" class="dish-divider"></div>
      <div id="dish-list" class="dish-list"></div>
    </section>
  </div>
  <div id="toast" class="toast"></div>

  <script>
    // =============================================
    // LANGUAGE SYSTEM
    // =============================================
    const LANGUAGES = [
      { code: 'zh-HK', flag: '🇭🇰', label: '繁中' },
      { code: 'zh-CN', flag: '🇨🇳', label: '简中' },
      { code: 'en',    flag: '🇬🇧', label: 'EN' },
      { code: 'ja',    flag: '🇯🇵', label: 'JP' },
      { code: 'ko',    flag: '🇰🇷', label: 'KR' },
      { code: 'fr',    flag: '🇫🇷', label: 'FR' }
    ];

    let currentLang = localStorage.getItem('lunchOracleLang') || 'zh-HK';

    const UI = {
      title:          { 'zh-HK': '🔮 今日食乜好？', 'zh-CN': '🔮 今天吃什么？', en: '🔮 What to Eat Today?', ja: '🔮 今日何食べる？', ko: '🔮 오늘 뭐 먹지?', fr: '🔮 On mange quoi ?' },
      subtitle:       { 'zh-HK': 'Times Square 午餐神諭 Lunch Oracle', 'zh-CN': '黄龙国际中心 · 午餐神谕', en: 'Times Square Lunch Oracle', ja: 'Times Square ランチ神託', ko: 'Times Square 점심 신탁', fr: 'Times Square · Oracle du Déjeuner' },
      drawBtn:        { 'zh-HK': '🎴 求籤！Draw Your Lunch Fortune', 'zh-CN': '🎴 求签！抽取你的午餐运势', en: '🎴 Draw Your Lunch Fortune!', ja: '🎴 おみくじを引く！', ko: '🎴 점심 운세 뽑기!', fr: '🎴 Tirez votre carte déjeuner !' },
      pickYourself:   { 'zh-HK': '或自己揀 Or pick yourself ↓', 'zh-CN': '或者自己选 ↓', en: 'Or pick yourself ↓', ja: 'または自分で選ぶ ↓', ko: '또는 직접 선택 ↓', fr: 'Ou choisissez vous-même ↓' },
      sectionDivider: { 'zh-HK': '自己揀 Pick yourself', 'zh-CN': '自己选', en: 'Pick yourself', ja: '自分で選ぶ', ko: '직접 선택', fr: 'Choisir soi-même' },
      todayElement:   { 'zh-HK': '今日五行：', 'zh-CN': '今日五行：', en: "Today's Element: ", ja: '今日の五行：', ko: '오늘의 오행: ', fr: "Élément du jour : " },
      lunchFortune:   { 'zh-HK': '午餐運勢 Lunch Fortune', 'zh-CN': '午餐运势', en: 'Lunch Fortune', ja: 'ランチ運勢', ko: '점심 운세', fr: 'Fortune du déjeuner' },
      oracleLabel:    { 'zh-HK': '今日午餐神諭 Lunch Oracle', 'zh-CN': '今日午餐神谕', en: "Today's Lunch Oracle", ja: '今日のランチ神託', ko: '오늘의 점심 신탁', fr: 'Oracle du Déjeuner' },
      btnAccept:      { 'zh-HK': '✅ 就係佢！就食呢個', 'zh-CN': '✅ 就是它！就吃这个', en: '✅ This is it! Let\'s eat!', ja: '✅ これに決めた！', ko: '✅ 이거다! 먹자!', fr: '✅ C\'est décidé ! On y va !' },
      btnRedraw:      { 'zh-HK': '🔄 唔啱！再求一次', 'zh-CN': '🔄 不行！再来一次', en: '🔄 Nah! Draw again', ja: '🔄 もう一回引く！', ko: '🔄 다시 뽑기!', fr: '🔄 Non ! Retirer une carte' },
      btnShare:       { 'zh-HK': '📋 分享', 'zh-CN': '📋 分享', en: '📋 Share', ja: '📋 シェア', ko: '📋 공유', fr: '📋 Partager' },
      btnBrowse:      { 'zh-HK': '📂 自己揀', 'zh-CN': '📂 自己选', en: '📂 Browse', ja: '📂 自分で選ぶ', ko: '📂 직접 선택', fr: '📂 Parcourir' },
      btnBack:        { 'zh-HK': '← 返回', 'zh-CN': '← 返回', en: '← Back', ja: '← 戻る', ko: '← 돌아가기', fr: '← Retour' },
      justCategory:   { 'zh-HK': '就要{name}！', 'zh-CN': '就要{name}！', en: 'Just {name}!', ja: '{name}でお願い！', ko: '{name}으로 할래!', fr: '{name}, tout simplement !' },
      dishDivider:    { 'zh-HK': '或揀一個餸 or pick a dish', 'zh-CN': '或者选一道菜', en: 'Or pick a dish', ja: 'または料理を選ぶ', ko: '또는 요리 선택', fr: 'Ou choisir un plat' },
      fortuneRevealed:{ 'zh-HK': '神諭已出！', 'zh-CN': '神谕已出！', en: 'Fortune revealed!', ja: '神託が出ました！', ko: '신탁이 나왔습니다!', fr: 'La carte est révélée !' },
      enjoyMeal:      { 'zh-HK': '🎉 食嘅開心！', 'zh-CN': '🎉 吃得开心！', en: '🎉 Enjoy your meal!', ja: '🎉 いただきます！', ko: '🎉 맛있게 드세요!', fr: '🎉 Bon appétit !' },
      copied:         { 'zh-HK': '✅ 已複製！', 'zh-CN': '✅ 已复制！', en: '✅ Copied!', ja: '✅ コピーしました！', ko: '✅ 복사됨!', fr: '✅ Copié !' },
      luckyColor:     { 'zh-HK': '幸運色：', 'zh-CN': '幸运色：', en: 'Lucky color: ', ja: 'ラッキーカラー：', ko: '행운의 색: ', fr: 'Couleur porte-bonheur : ' },
      elementSuffix:  { 'zh-HK': '行', 'zh-CN': '行', en: '', ja: '行', ko: '행', fr: '' }
    };

    function t(key) { return UI[key]?.[currentLang] || UI[key]?.['en'] || ''; }

    // =============================================
    // FOOD DATA (multi-language)
    // =============================================

    function catName(cat) { return cat.name[currentLang] || cat.name.en; }
    function catSub(cat) { return cat.sub[currentLang] || cat.sub.en; }
    function dishName(dish) { return dish.n[currentLang] || dish.n.en; }
    function dishSub(dish) {
      // Show English as subtitle for CJK, show zh-HK for English/French
      if (['zh-HK','zh-CN','ja','ko'].includes(currentLang)) return dish.n.en;
      return dish.n['zh-HK'];
    }
    function elemName(el) { return el.name[currentLang] || el.name.en; }
    function colorName(c) { return c.n[currentLang] || c.n.en; }
    function getSpinMsgs() { return SPIN_MESSAGES[currentLang] || SPIN_MESSAGES.en; }

    function getDailySeed(date) {
      const d = date || new Date();
      const dateStr = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
      let hash = 0;
      for (let i = 0; i < dateStr.length; i++) hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
      return Math.abs(hash);
    }

    function getDailyFortune() {
      const now = new Date();
      const seed = getDailySeed(now);
      const day = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
      const element = ELEMENTS[seed % 5];
      const msgs = element.messages[currentLang] || element.messages.en;
      const message = msgs[(seed * day) % msgs.length];
      const luckyColor = LUCKY_COLORS[(seed * 3 + day) % LUCKY_COLORS.length];
      const fortuneScore = (seed % 4) + 2;
      return { element, message, luckyColor, fortuneScore };
    }

      el.textContent = text;
      el.classList.add('show');

    // =============================================
    // DIVINATION ANIMATION
    // =============================================
    function runDivination() {
      showScreen($('screen-divine'));
      const $emoji = $('slot-emoji');
      const $msg = $('divine-message');
      const $sub = $('divine-sub');
      const msgs = getSpinMsgs();

      $emoji.className = 'slot-emoji spinning';
      $msg.textContent = msgs[0];
      $sub.textContent = '';

      const allEmojis = FOOD_DATA.map(c => c.emoji);
      let cycle = 0, msgIdx = 0;
      const total = 18, baseDelay = 70, maxDelay = 350;

      const msgInterval = setInterval(() => {
        msgIdx = (msgIdx + 1) % msgs.length;
        $msg.textContent = msgs[msgIdx];
      }, 600);

      function tick() {
        $emoji.textContent = allEmojis[cycle % allEmojis.length];
        cycle++;
        if (cycle >= total) {
          clearInterval(msgInterval);
          $emoji.className = 'slot-emoji';
          const fortune = getDailyFortune();
          const biased = fortune.element.categories;
          const pool = Math.random() < 0.7 ? FOOD_DATA.filter(c => biased.includes(c.id)) : FOOD_DATA;
          const cat = (pool.length ? pool : FOOD_DATA)[Math.floor(Math.random() * (pool.length || FOOD_DATA.length))];
          const dish = cat.dishes[Math.floor(Math.random() * cat.dishes.length)];
          currentResult = { category: cat, dish, fortune };
          $emoji.textContent = cat.emoji;
          $msg.textContent = t('fortuneRevealed');
          $sub.textContent = '✨';
          setTimeout(() => { renderResult(); showScreen($('screen-result')); }, 800);
          return;
        }
        const progress = cycle / total;
        setTimeout(tick, baseDelay + (maxDelay - baseDelay) * Math.pow(progress, 2.5));
      }
      setTimeout(tick, 300);
    }

      let text = '🔮 ' + t('oracleLabel') + '\n\n';
      text += category.emoji + ' ' + dishName(dish) + ' / ' + dishSub(dish) + '\n';
      text += '(' + catName(category) + ')\n\n';
      text += fortune.element.emoji + ' ' + fortune.message + '\n\n';
      text += t('lunchFortune') + ' ' + '★'.repeat(fortune.fortuneScore) + '☆'.repeat(5 - fortune.fortuneScore) + '\n';
      text += '— Times Square Lunch Oracle 🔮';
      if (navigator.share) navigator.share({ text }).catch(() => copyText(text));
      else copyText(text);
    }

      const card = e.target.closest('.dish-card');
      if (!card) return;
      const dish = selectedCategory.dishes[parseInt(card.dataset.index, 10)];
      const fortune = getDailyFortune();
      currentResult = { category: selectedCategory, dish, fortune };
      renderResult();
      showScreen($('screen-result'));
    });
    $('btn-accept').addEventListener('click', () => { showToast(t('enjoyMeal')); setTimeout(() => showScreen($('screen-home')), 1500); });
    $('btn-redraw').addEventListener('click', runDivination);
    $('btn-share').addEventListener('click', shareResult);
    $('btn-browse').addEventListener('click', () => showScreen($('screen-home')));

    // =============================================
    // INIT
    // =============================================
    renderLangBar();
    renderHome();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
  </script>
</body>
</html>
