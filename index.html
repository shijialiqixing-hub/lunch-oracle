<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0F0F0F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Lunch Oracle" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔮</text></svg>" />
  <link rel="manifest" href="manifest.json" />
  <title>午餐神諭 Lunch Oracle</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Noto+Sans+SC:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0F0F0F;
      --surface: #1A1A1A;
      --surface-elevated: #242424;
      --primary: #FF6B35;
      --primary-dim: rgba(255, 107, 53, 0.15);
      --primary-glow: rgba(255, 107, 53, 0.4);
      --secondary: #00D9A5;
      --gold: #FFD700;
      --gold-dim: rgba(255, 215, 0, 0.15);
      --purple: #9B6DFF;
      --purple-dim: rgba(155, 109, 255, 0.15);
      --text-primary: #FFFFFF;
      --text-secondary: #A3A3A3;
      --text-muted: #737373;
      --border: #2D2D2D;
      --border-light: #3D3D3D;
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --radius-xl: 20px;
      --radius-2xl: 28px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      font-family: 'Noto Sans TC', 'Noto Sans SC', -apple-system, sans-serif;
      background-color: var(--bg);
      color: var(--text-primary);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    body {
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    #app { position: relative; width: 100%; min-height: 100vh; overflow: hidden; }

    .screen {
      position: absolute; top: 0; left: 0; width: 100%; min-height: 100vh;
      transform: translateX(100%); opacity: 0;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.25s ease;
      pointer-events: none; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: 40px;
    }
    .screen.active { position: relative; transform: translateX(0); opacity: 1; pointer-events: auto; }

    /* === LANGUAGE TOGGLE === */
    .lang-toggle {
      display: flex; justify-content: center; gap: 4px;
      padding: 16px 16px 0;
    }
    .lang-toggle .lang-btn {
      padding: 8px 20px; border-radius: 20px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 14px; font-weight: 500;
      cursor: pointer; touch-action: manipulation;
      font-family: inherit; transition: all 0.2s ease;
    }
    .lang-toggle .lang-btn.active {
      background: var(--primary-dim); border-color: var(--primary);
      color: var(--primary); font-weight: 700;
    }
    .lang-toggle .lang-btn:active { transform: scale(0.95); }

    /* === HOME SCREEN === */
    .home-header { padding: 16px 20px 8px; text-align: center; }
    .home-header h1 { font-size: 28px; font-weight: 900; margin-bottom: 4px; }
    .home-header .subtitle { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; }

    .fortune-banner {
      margin: 12px 16px 0;
      background: linear-gradient(135deg, rgba(155, 109, 255, 0.12), rgba(255, 215, 0, 0.10));
      border: 1px solid rgba(155, 109, 255, 0.25);
      border-radius: var(--radius-xl); padding: 16px;
      text-align: center; position: relative; overflow: hidden;
    }
    .fortune-banner::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 0%, rgba(155, 109, 255, 0.08), transparent 70%);
      pointer-events: none;
    }
    .fortune-banner .element-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 6px; }
    .fortune-banner .element-emoji { font-size: 24px; }
    .fortune-banner .element-name { font-size: 15px; font-weight: 700; color: var(--gold); }
    .fortune-banner .fortune-text { font-size: 13px; color: var(--text-secondary); line-height: 1.5; }
    .fortune-banner .fortune-stars { margin-top: 6px; font-size: 16px; letter-spacing: 2px; }
    .fortune-banner .star-filled { color: var(--gold); }
    .fortune-banner .star-empty { color: var(--border-light); }
    .fortune-label { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

    /* === PREFERENCE PANEL === */
    .pref-panel {
      margin: 12px 16px 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-xl);
      overflow: hidden;
    }
    .pref-toggle {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 16px; cursor: pointer; touch-action: manipulation;
    }
    .pref-toggle-label { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
    .pref-toggle-arrow { font-size: 12px; color: var(--text-muted); transition: transform 0.3s ease; }
    .pref-panel.expanded .pref-toggle-arrow { transform: rotate(180deg); }
    .pref-toggle-summary { font-size: 11px; color: var(--text-muted); margin-left: 8px; }

    .pref-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s ease;
      padding: 0 16px;
    }
    .pref-panel.expanded .pref-body {
      max-height: 600px;
      padding: 0 16px 16px;
    }

    .pref-row { margin-bottom: 12px; }
    .pref-row:last-child { margin-bottom: 0; }
    .pref-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; font-weight: 500; }
    .pref-pills { display: flex; gap: 6px; flex-wrap: wrap; }
    .pref-pill {
      padding: 6px 12px; border-radius: 16px;
      background: var(--surface-elevated); border: 1px solid var(--border);
      color: var(--text-muted); font-size: 12px; font-weight: 500;
      cursor: pointer; touch-action: manipulation;
      font-family: inherit; transition: all 0.2s ease;
      white-space: nowrap;
    }
    .pref-pill.active {
      background: var(--primary-dim); border-color: var(--primary);
      color: var(--primary); font-weight: 600;
    }
    .pref-pill:active { transform: scale(0.95); }

    /* === DRAW SECTION === */
    .draw-section { padding: 16px 16px 8px; text-align: center; }
    .draw-btn {
      width: 100%; padding: 18px 24px;
      background: linear-gradient(135deg, var(--primary), #FF8F35);
      border: none; border-radius: var(--radius-xl);
      color: #fff; font-size: 19px; font-weight: 800;
      font-family: inherit; cursor: pointer; touch-action: manipulation;
      transition: transform 0.1s ease;
      box-shadow: 0 4px 24px var(--primary-glow);
      animation: btnPulse 2.5s ease-in-out infinite;
    }
    .draw-btn:active { transform: scale(0.97); animation: none; }
    @keyframes btnPulse {
      0%, 100% { box-shadow: 0 4px 24px var(--primary-glow); }
      50% { box-shadow: 0 4px 40px rgba(255, 107, 53, 0.6); }
    }
    .pick-yourself-link {
      display: block; margin-top: 12px; font-size: 13px; color: var(--text-muted);
      text-decoration: none; cursor: pointer; background: none; border: none; font-family: inherit;
    }

    /* === HISTORY SECTION === */
    .history-section { margin: 8px 16px 0; }
    .history-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
    .history-clear { font-size: 11px; color: var(--text-muted); cursor: pointer; background: none; border: none; font-family: inherit; }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      font-size: 13px;
    }
    .history-item .h-emoji { font-size: 20px; flex-shrink: 0; }
    .history-item .h-info { flex: 1; }
    .history-item .h-name { font-weight: 600; font-size: 13px; }
    .history-item .h-date { font-size: 11px; color: var(--text-muted); }
    .history-item .h-exclude {
      padding: 4px 8px; border-radius: 12px; font-size: 11px;
      background: transparent; border: 1px solid var(--border);
      color: var(--text-muted); cursor: pointer; font-family: inherit;
      transition: all 0.2s ease;
    }
    .history-item .h-exclude.excluded {
      background: rgba(255, 59, 48, 0.15); border-color: rgba(255, 59, 48, 0.4);
      color: #FF3B30;
    }

    /* === SECTION DIVIDER === */
    .section-divider {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 20px; color: var(--text-muted); font-size: 12px;
      letter-spacing: 1px;
    }
    .section-divider::before, .section-divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* === CATEGORY GRID === */
    .category-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; padding: 0 16px 32px; }
    .category-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 12px 4px;
      text-align: center; cursor: pointer;
      transition: transform 0.1s ease, background 0.2s ease;
      touch-action: manipulation; min-height: 72px;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px;
    }
    .category-card:active { transform: scale(0.95); background: var(--surface-elevated); }
    .category-card .emoji { font-size: 26px; line-height: 1; }
    .category-card .cat-name { font-size: 11px; font-weight: 600; }

    /* === DIVINATION SCREEN === */
    .divine-screen { background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .divine-circle {
      width: 200px; height: 200px; border-radius: 50%;
      border: 2px solid rgba(155, 109, 255, 0.3);
      display: flex; align-items: center; justify-content: center;
      position: relative; animation: circleGlow 2s ease-in-out infinite;
    }
    @keyframes circleGlow {
      0%, 100% { border-color: rgba(155, 109, 255, 0.3); box-shadow: 0 0 30px rgba(155, 109, 255, 0.1); }
      50% { border-color: rgba(155, 109, 255, 0.6); box-shadow: 0 0 60px rgba(155, 109, 255, 0.25); }
    }
    .divine-circle::before {
      content: '☯'; position: absolute; font-size: 180px; color: rgba(155, 109, 255, 0.06);
      animation: yinYangSpin 8s linear infinite;
    }
    @keyframes yinYangSpin { to { transform: rotate(360deg); } }
    .slot-emoji { font-size: 72px; z-index: 2; transition: filter 0.1s ease; }
    .slot-emoji.spinning { filter: blur(4px); }
    .divine-message { margin-top: 28px; font-size: 16px; font-weight: 600; color: var(--purple); text-align: center; min-height: 24px; }
    .divine-sub { margin-top: 8px; font-size: 12px; color: var(--text-muted); }

    /* === RESULT SCREEN === */
    .result-content { padding: 0 16px; }
    .tarot-card {
      background: linear-gradient(160deg, #1E1E2E, #1A1A2A);
      border: 1px solid rgba(155, 109, 255, 0.3);
      border-radius: var(--radius-2xl); padding: 24px 18px;
      margin: 16px 0; text-align: center;
      position: relative; overflow: hidden;
      animation: cardReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
    @keyframes cardReveal {
      0% { transform: perspective(800px) rotateY(90deg); opacity: 0; }
      100% { transform: perspective(800px) rotateY(0deg); opacity: 1; }
    }
    .tarot-card::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(circle at 50% 20%, rgba(255, 215, 0, 0.06), transparent 60%);
      pointer-events: none;
    }
    .card-label { font-size: 11px; color: var(--purple); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 12px; font-weight: 600; }
    .card-emoji { font-size: 56px; margin-bottom: 8px; }
    .card-restaurant-name { font-size: 24px; font-weight: 900; }
    .card-meta { display: flex; align-items: center; justify-content: center; gap: 12px; margin-top: 8px; font-size: 13px; color: var(--text-secondary); }
    .card-meta span { display: flex; align-items: center; gap: 4px; }

    .card-dishes { margin-top: 16px; text-align: left; }
    .card-dishes .dishes-title { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
    .card-dish-item {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: rgba(255,255,255,0.04);
      border-radius: var(--radius-md); margin-bottom: 6px;
    }
    .card-dish-item .dish-star { color: var(--gold); font-size: 14px; }
    .card-dish-item .dish-name { font-size: 14px; font-weight: 600; }
    .card-dish-item .dish-note { font-size: 11px; color: var(--text-muted); margin-left: auto; }

    .divination-copy {
      margin-top: 16px; padding: 12px 14px;
      background: var(--purple-dim); border-radius: var(--radius-md);
      font-size: 13px; line-height: 1.6; color: #C9B8FF;
    }
    .match-copy {
      margin-top: 8px; font-size: 12px; color: var(--text-muted); text-align: center;
    }
    .element-badge {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 12px; padding: 6px 14px;
      background: var(--gold-dim); border: 1px solid rgba(255, 215, 0, 0.25);
      border-radius: 20px; font-size: 12px; color: var(--gold); font-weight: 600;
    }
    .fortune-score { margin-top: 8px; font-size: 14px; color: var(--text-muted); }
    .fortune-score .star-filled { color: var(--gold); font-size: 18px; }
    .fortune-score .star-empty { color: var(--border-light); font-size: 18px; }

    /* === PLATFORM BUTTONS === */
    .platform-row {
      display: flex; gap: 8px; margin-top: 16px; justify-content: center;
    }
    .platform-btn {
      flex: 1; padding: 10px 8px; border-radius: var(--radius-md);
      font-size: 12px; font-weight: 600; text-align: center;
      cursor: pointer; touch-action: manipulation;
      text-decoration: none; display: flex; align-items: center;
      justify-content: center; gap: 4px;
      transition: all 0.2s ease; font-family: inherit; border: none;
    }
    .platform-btn:active { transform: scale(0.95); }
    .platform-btn.openrice { background: rgba(255, 107, 53, 0.15); color: var(--primary); border: 1px solid rgba(255, 107, 53, 0.3); }
    .platform-btn.keeta { background: rgba(0, 217, 165, 0.15); color: var(--secondary); border: 1px solid rgba(0, 217, 165, 0.3); }
    .platform-btn.gmaps { background: rgba(66, 133, 244, 0.15); color: #4285F4; border: 1px solid rgba(66, 133, 244, 0.3); }
    .platform-btn.dianping { background: rgba(255, 107, 53, 0.15); color: var(--primary); border: 1px solid rgba(255, 107, 53, 0.3); }
    .platform-btn.meituan { background: rgba(255, 215, 0, 0.15); color: var(--gold); border: 1px solid rgba(255, 215, 0, 0.3); }
    .platform-btn.gaode { background: rgba(66, 133, 244, 0.15); color: #4285F4; border: 1px solid rgba(66, 133, 244, 0.3); }

    /* === RESULT ACTIONS === */
    .result-actions { margin-top: 16px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 20px; }
    .btn-accept { width: 100%; padding: 16px; background: var(--secondary); border: none; border-radius: var(--radius-lg); color: #000; font-size: 16px; font-weight: 700; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: transform 0.1s ease; }
    .btn-accept:active { transform: scale(0.98); }
    .btn-redraw { width: 100%; padding: 14px; background: var(--primary-dim); border: 1px solid var(--primary); border-radius: var(--radius-lg); color: var(--primary); font-size: 15px; font-weight: 600; font-family: inherit; cursor: pointer; touch-action: manipulation; transition: transform 0.1s ease; }
    .btn-redraw:active { transform: scale(0.98); }
    .btn-row { display: flex; gap: 10px; }
    .btn-share { flex: 1; padding: 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-secondary); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; }
    .btn-browse { flex: 1; padding: 14px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-lg); color: var(--text-muted); font-size: 14px; font-family: inherit; cursor: pointer; touch-action: manipulation; }

    /* === BROWSE SCREEN === */
    .screen-header { display: flex; align-items: center; gap: 12px; padding: 20px 16px 12px; position: sticky; top: 0; background: var(--bg); z-index: 10; border-bottom: 1px solid var(--border); }
    .back-btn { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text-primary); font-size: 14px; padding: 8px 12px; cursor: pointer; touch-action: manipulation; font-family: inherit; }
    .screen-header h2 { font-size: 20px; font-weight: 600; flex: 1; }

    .browse-category-title {
      padding: 14px 20px 8px; font-size: 13px; font-weight: 700;
      color: var(--text-secondary); display: flex; align-items: center; gap: 8px;
    }
    .restaurant-list { padding: 0 16px 8px; }
    .restaurant-card {
      display: flex; align-items: center; gap: 12px;
      padding: 14px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--radius-md);
      margin-bottom: 8px; cursor: pointer; touch-action: manipulation;
      transition: transform 0.1s ease, background 0.2s ease;
    }
    .restaurant-card:active { transform: scale(0.98); background: var(--surface-elevated); }
    .restaurant-card .r-emoji { font-size: 28px; flex-shrink: 0; }
    .restaurant-card .r-info { flex: 1; }
    .restaurant-card .r-name { font-size: 15px; font-weight: 600; }
    .restaurant-card .r-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
    .restaurant-card .r-arrow { color: var(--text-muted); font-size: 16px; }

    .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--surface-elevated); border: 1px solid var(--border-light); border-radius: var(--radius-md); padding: 12px 24px; font-size: 14px; color: var(--secondary); font-weight: 600; opacity: 0; transition: opacity 0.3s ease, transform 0.3s ease; z-index: 100; pointer-events: none; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    @media (max-width: 768px) {
      ::-webkit-scrollbar { display: none; }
      * { scrollbar-width: none; }
    }
  </style>
</head>
<body>
  <div id="app">
    <!-- HOME SCREEN -->
    <section id="screen-home" class="screen active">
      <div class="lang-toggle">
        <button class="lang-btn active" data-lang="zh-HK">🇭🇰 繁中</button>
        <button class="lang-btn" data-lang="zh-CN">🇨🇳 简中</button>
      </div>

      <header class="home-header">
        <h1 id="home-title"></h1>
        <div id="home-subtitle" class="subtitle"></div>
      </header>

      <div id="fortune-banner" class="fortune-banner"></div>

      <!-- Preference Panel -->
      <div id="pref-panel" class="pref-panel">
        <div id="pref-toggle" class="pref-toggle">
          <span class="pref-toggle-label" id="pref-toggle-label"></span>
          <span>
            <span id="pref-summary" class="pref-toggle-summary"></span>
            <span class="pref-toggle-arrow">▼</span>
          </span>
        </div>
        <div class="pref-body">
          <div class="pref-row">
            <div class="pref-label" id="pref-label-diners"></div>
            <div class="pref-pills" id="pills-diners"></div>
          </div>
          <div class="pref-row">
            <div class="pref-label" id="pref-label-flavor"></div>
            <div class="pref-pills" id="pills-flavor"></div>
          </div>
          <div class="pref-row">
            <div class="pref-label" id="pref-label-budget"></div>
            <div class="pref-pills" id="pills-budget"></div>
          </div>
          <div class="pref-row">
            <div class="pref-label" id="pref-label-time"></div>
            <div class="pref-pills" id="pills-time"></div>
          </div>
          <div class="pref-row">
            <div class="pref-label" id="pref-label-dietary"></div>
            <div class="pref-pills" id="pills-dietary"></div>
          </div>
          <div class="pref-row">
            <div class="pref-label" id="pref-label-scene"></div>
            <div class="pref-pills" id="pills-scene"></div>
          </div>
        </div>
      </div>

      <div class="draw-section">
        <button id="btn-draw" class="draw-btn"></button>
        <button id="btn-pick-yourself" class="pick-yourself-link"></button>
      </div>

      <!-- Recent History -->
      <div id="history-section" class="history-section" style="display:none;">
        <div class="history-label">
          <span id="history-label-text"></span>
          <button id="history-clear" class="history-clear"></button>
        </div>
        <div id="history-list" class="history-list"></div>
      </div>

      <div id="section-divider" class="section-divider"></div>
      <div id="category-grid" class="category-grid"></div>
    </section>

    <!-- DIVINATION SCREEN -->
    <section id="screen-divine" class="screen divine-screen">
      <div class="divine-circle">
        <div id="slot-emoji" class="slot-emoji">🔮</div>
      </div>
      <div id="divine-message" class="divine-message"></div>
      <div id="divine-sub" class="divine-sub"></div>
    </section>

    <!-- RESULT SCREEN -->
    <section id="screen-result" class="screen">
      <div class="result-content">
        <div id="tarot-card" class="tarot-card"></div>
        <div id="platform-row" class="platform-row"></div>
        <div class="result-actions">
          <button id="btn-accept" class="btn-accept"></button>
          <button id="btn-redraw" class="btn-redraw"></button>
          <div class="btn-row">

    function getFilteredPool() {
      const db = RESTAURANT_DB[currentLang] || [];
      let pool = [...db];
      const ex = getExclusions();

      // 1. Hard: exclusions
      pool = pool.filter(r => !ex.includes(r.id));

      // 2. Hard: dietary
      if (prefs.dietary && prefs.dietary.length > 0) {

          if (d === 'no-spicy') pool = pool.filter(r => r.flavor !== 'heavy' || r.dietaryTags.includes('no-spicy'));
          if (d === 'no-seafood') pool = pool.filter(r => r.dietaryTags.includes('no-seafood'));
        });
      }

      // 3. Hard: group size
      if (prefs.diners !== null) {
        const filtered = pool.filter(r => r.groupSize.includes(prefs.diners));
        if (filtered.length >= 2) pool = filtered;
      }

      // 4. Hard: budget
      if (prefs.budget !== null) {
        const filtered = pool.filter(r => r.budget <= prefs.budget);
        if (filtered.length >= 2) pool = filtered;
      }

      // 5. Hard: time
      if (prefs.time === 'fast') {
        const filtered = pool.filter(r => r.timeNeeded === 'fast');
        if (filtered.length >= 2) pool = filtered;
      }

      // 6. Soft: scene
      if (prefs.scene && prefs.scene !== 'casual') {
        const preferred = pool.filter(r => r.scene.includes(prefs.scene));
        if (preferred.length >= 2) pool = preferred;
      }

      // 7. Soft: flavor
      if (prefs.flavor) {
        const preferred = pool.filter(r => r.flavor === prefs.flavor || r.flavor === 'neutral');
        if (preferred.length >= 2) pool = preferred;
      }

      // 8. Soft: history (avoid last 5 days)
      const recent = getRecentHistoryIds(5);
      if (recent.length > 0) {
        const nonRepeat = pool.filter(r => !recent.includes(r.id));
        if (nonRepeat.length >= 2) pool = nonRepeat;
      }

      // 9. Wuxing bias (70%)
      const fortune = getDailyFortune();
      if (Math.random() < 0.7) {
        const biased = pool.filter(r => fortune.element.categories.includes(r.category));
        if (biased.length >= 1) pool = biased;
      }

      return pool;

    function getDailySeed(date) {
      const d = date || new Date();
      const dateStr = d.getFullYear() + '-' + (d.getMonth() + 1) + '-' + d.getDate();
      let hash = 0;
      for (let i = 0; i < dateStr.length; i++) hash = ((hash << 5) - hash) + dateStr.charCodeAt(i);
      return Math.abs(hash);
    }

    function getDailyFortune() {
      const now = new Date();
      const seed = getDailySeed(now);
      const day = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);
      const element = ELEMENTS[seed % 5];
      const msgs = element.messages[currentLang] || element.messages['zh-HK'];
      const message = msgs[(seed * day) % msgs.length];
      const luckyColor = LUCKY_COLORS[(seed * 3 + day) % LUCKY_COLORS.length];
      const fortuneScore = (seed % 4) + 2;
      return { element, message, luckyColor, fortuneScore };
    }

      $('home-subtitle').textContent = t('subtitle');
      $('btn-draw').textContent = t('drawBtn');
      $('btn-pick-yourself').textContent = t('pickYourself');
      $('section-divider').textContent = t('sectionDivider');
      $('btn-accept').textContent = t('btnAccept');
      $('btn-redraw').textContent = t('btnRedraw');
      $('btn-share').textContent = t('btnShare');
      $('btn-browse').textContent = t('btnBrowse');
      $('btn-back-home').textContent = t('btnBack');
      $('browse-title').textContent = t('browseTitle');

      $('fortune-banner').innerHTML = `
        <div class="element-row">
          <span class="element-emoji">${f.element.emoji}</span>
          <span class="element-name">${t('todayElement')}${elemName(f.element)}${t('elementSuffix')}</span>
        </div>
        <div class="fortune-text">${f.message}</div>
        <div class="fortune-stars">${starsHTML(f.fortuneScore)}</div>
        <div class="fortune-label">${t('lunchFortune')}</div>`;

      // Category grid
      const cats = CATEGORIES[currentLang] || [];
      $('category-grid').innerHTML = cats.map(cat => `
        <div class="category-card" data-id="${cat.id}">
          <span class="emoji">${cat.emoji}</span>
          <span class="cat-name">${cat.name}</span>
        </div>`).join('');

      renderPrefs();
      renderHistory();
    }

    // =============================================
    // RENDER: HISTORY
    // =============================================
    function renderHistory() {
      const h = getHistory().slice(0, 3);
      const section = $('history-section');
      if (h.length === 0) { section.style.display = 'none'; return; }
      section.style.display = 'block';
      $('history-label-text').textContent = t('historyLabel');
      $('history-clear').textContent = t('historyClear');
      const ex = getExclusions();
      $('history-list').innerHTML = h.map(item => `
        <div class="history-item">
          <span class="h-emoji">${item.emoji}</span>
          <div class="h-info">
            <div class="h-name">${item.name}</div>
            <div class="h-date">${item.date} · ${item.dish}</div>
          </div>
          <button class="h-exclude ${ex.includes(item.id) ? 'excluded' : ''}" data-id="${item.id}">
            ${ex.includes(item.id) ? t('excluded') : t('exclude')}
          </button>
        </div>`).join('');
    }

    // =============================================
    // RENDER: RESULT
    // =============================================
    function renderResult() {
      if (!currentResult) return;
      const { restaurant, fortune } = currentResult;
      const el = fortune.element;
      const lc = fortune.luckyColor;
      const budgetLabel = BUDGET_LABELS[currentLang][restaurant.budget];
      const matchText = buildMatchText(restaurant);

      $('tarot-card').innerHTML = `
        <div class="card-label">${t('oracleLabel')}</div>
        <div class="card-emoji">${restaurant.emoji}</div>
        <div class="card-restaurant-name">${restaurant.name}</div>
        <div class="card-meta">
          <span>📍 ${restaurant.distance}</span>
          <span>💰 ${t('perPerson')}${budgetLabel}</span>
        </div>
        <div class="card-dishes">
          <div class="dishes-title">${t('recDishes')}</div>
          ${restaurant.dishes.map(d => `
            <div class="card-dish-item">
              <span class="dish-star">⭐</span>
              <span class="dish-name">${d.name}</span>
              <span class="dish-note">${d.note}</span>
            </div>`).join('')}
        </div>
        <div class="divination-copy">${fortune.message}</div>
        ${matchText ? `<div class="match-copy">${matchText}</div>` : ''}
        <div class="element-badge">${el.emoji} ${elemName(el)}${t('elementSuffix')} · ${lc.emoji} ${t('luckyColor')}${colorName(lc)}</div>
        <div class="fortune-score">${t('lunchFortune')} ${starsHTML(fortune.fortuneScore)}</div>`;

      // Re-trigger animation
      const card = $('tarot-card');
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = '';

      // Platform buttons
      renderPlatformButtons(restaurant);
    }

    function renderPlatformButtons(restaurant) {
      const p = restaurant.platforms;
      if (currentLang === 'zh-HK') {
        $('platform-row').innerHTML = `
          <a class="platform-btn openrice" href="${p.openrice}" target="_blank" rel="noopener">🍽️ OpenRice</a>
          <a class="platform-btn keeta" href="${p.keeta}" target="_blank" rel="noopener">🛵 Keeta</a>
          <a class="platform-btn gmaps" href="${p.maps}" target="_blank" rel="noopener">🗺️ Maps</a>`;
      } else {
        $('platform-row').innerHTML = `
          <a class="platform-btn dianping" href="${p.dianping}" target="_blank" rel="noopener">📍 大众点评</a>
          <a class="platform-btn meituan" href="${p.meituan}" target="_blank" rel="noopener">🛵 美团</a>
          <a class="platform-btn gaode" href="${p.gaode}" target="_blank" rel="noopener">🗺️ 高德</a>`;
      }
    }

    // =============================================
    // RENDER: BROWSE
    // =============================================
    function renderBrowse(categoryId) {
      const db = RESTAURANT_DB[currentLang] || [];
      const cats = CATEGORIES[currentLang] || [];

      let html = '';
      const catsToShow = categoryId ? cats.filter(c => c.id === categoryId) : cats;

      catsToShow.forEach(cat => {
        const restaurants = db.filter(r => r.category === cat.id);
        if (restaurants.length === 0) return;
        html += `<div class="browse-category-title">${cat.emoji} ${cat.name}</div>`;
        html += '<div class="restaurant-list">';
        restaurants.forEach(r => {
          const budgetLabel = BUDGET_LABELS[currentLang][r.budget];
          html += `
            <div class="restaurant-card" data-id="${r.id}">
              <span class="r-emoji">${r.emoji}</span>
              <div class="r-info">
                <div class="r-name">${r.name}</div>
                <div class="r-meta">📍 ${r.distance} · 💰 ${budgetLabel} · 👥 ${r.groupSize.map(g => g === 4 ? '5+' : g).join('-')}人</div>
              </div>
              <span class="r-arrow">›</span>
            </div>`;
        });
        html += '</div>';
      });

      $('browse-list').innerHTML = html;
    }

    // =============================================
    // DIVINATION ANIMATION
    // =============================================
    let isAnimating = false;
    function runDivination(specificRestaurant) {
      if (isAnimating) return;
      const pool = specificRestaurant ? [specificRestaurant] : getFilteredPool();
      if (pool.length === 0) {
        showToast(t('noResult'));
        return;
      }

      isAnimating = true;
      showScreen($('screen-divine'));
      const emojiEl = $('slot-emoji');
      const msgEl = $('divine-message');
      const subEl = $('divine-sub');
      const msgs = SPIN_MESSAGES[currentLang] || SPIN_MESSAGES['zh-HK'];

      emojiEl.className = 'slot-emoji spinning';
      msgEl.textContent = msgs[0];
      subEl.textContent = '';

      const allEmojis = pool.map(r => r.emoji);
      const total = 20;
      let cycle = 0, msgIdx = 0;

      const msgTimer = setInterval(() => {
        msgIdx = (msgIdx + 1) % msgs.length;
        msgEl.textContent = msgs[msgIdx];
      }, 500);

      const spinTimer = setInterval(() => {
        emojiEl.textContent = allEmojis[cycle % allEmojis.length];
        cycle++;
        if (cycle >= total) {
          clearInterval(spinTimer);
          clearInterval(msgTimer);
          emojiEl.className = 'slot-emoji';
          const fortune = getDailyFortune();
          const restaurant = pool[Math.floor(Math.random() * pool.length)];
          currentResult = { restaurant, fortune };
          emojiEl.textContent = restaurant.emoji;
          msgEl.textContent = t('fortuneRevealed');
          subEl.textContent = '✨';
          setTimeout(() => {
            renderResult();
            showScreen($('screen-result'));
            isAnimating = false;
          }, 800);
        }
      }, 120);
    }

    // =============================================
    // SHARE
    // =============================================
    function shareResult() {
      if (!currentResult) return;
      const { restaurant, fortune } = currentResult;
      const budgetLabel = BUDGET_LABELS[currentLang][restaurant.budget];
      let text = '🔮 ' + t('oracleLabel') + '\n\n';
      text += restaurant.emoji + ' ' + restaurant.name + '\n';
      text += '📍 ' + restaurant.distance + ' · 💰 ' + t('perPerson') + budgetLabel + '\n\n';
      text += t('recDishes') + '\n';
      restaurant.dishes.forEach(d => { text += '⭐ ' + d.name + ' — ' + d.note + '\n'; });
      text += '\n' + fortune.element.emoji + ' ' + fortune.message + '\n\n';
      text += t('lunchFortune') + ' ' + '★'.repeat(fortune.fortuneScore) + '☆'.repeat(5 - fortune.fortuneScore) + '\n';
      text += '— ' + t('subtitle') + ' 🔮';
      if (navigator.share) navigator.share({ text }).catch(() => copyText(text));
      else copyText(text);
    }

    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => showToast(t('copied'))).catch(() => showToast('⚠️'));
    }

    // =============================================
    // EVENTS
    // =============================================

    // Language toggle
    document.querySelector('.lang-toggle').addEventListener('click', e => {
      const btn = e.target.closest('.lang-btn');
      if (!btn) return;
      currentLang = btn.dataset.lang;
      localStorage.setItem('lunchOracleLang', currentLang);
      renderLangToggle();
      renderHome();
    });

    // Preference panel toggle
    $('pref-toggle').addEventListener('click', () => {
      $('pref-panel').classList.toggle('expanded');
    });

    // Preference pill selection
    document.querySelector('.pref-body').addEventListener('click', e => {
      const pill = e.target.closest('.pref-pill');
      if (!pill) return;
      const key = pill.dataset.key;
      let val = pill.dataset.value;
      const isMulti = pill.dataset.multi === 'true';

      // Parse value
      if (val === '__null__') val = null;
      else if (!isNaN(Number(val)) && val !== '') val = Number(val);

      if (isMulti) {
        // dietary: toggle in array
        if (!Array.isArray(prefs[key])) prefs[key] = [];
        if (val === null) {
          prefs[key] = [];
        } else {
          const idx = prefs[key].indexOf(val);
          if (idx >= 0) prefs[key].splice(idx, 1);
          else {
            // Remove 'null' equivalent if adding a real value
            prefs[key].push(val);
          }
        }
      } else {
        // Single select: toggle off if same
        prefs[key] = prefs[key] === val ? null : val;
      }

      savePrefs();
      renderPrefs();
    });

    // Draw button
    $('btn-draw').addEventListener('click', () => runDivination());

    // Pick yourself
    $('btn-pick-yourself').addEventListener('click', () => document.querySelector('.section-divider').scrollIntoView({ behavior: 'smooth' }));

    // Category grid
    $('category-grid').addEventListener('click', e => {
      const card = e.target.closest('.category-card');
      if (!card) return;
      renderBrowse(card.dataset.id);
      showScreen($('screen-browse'));
    });

    // Browse: restaurant card
    $('browse-list').addEventListener('click', e => {
      const card = e.target.closest('.restaurant-card');
      if (!card) return;
      const db = RESTAURANT_DB[currentLang] || [];
      const restaurant = db.find(r => r.id === card.dataset.id);
      if (restaurant) runDivination(restaurant);
    });

    // Back button
    $('btn-back-home').addEventListener('click', () => showScreen($('screen-home')));

    // Result actions
    $('btn-accept').addEventListener('click', () => {
      if (currentResult) {
        addToHistory(currentResult.restaurant, currentResult.restaurant.dishes[0].name);
      }
      showToast(t('enjoyMeal'));
      setTimeout(() => { renderHistory(); showScreen($('screen-home')); }, 1500);
    });
    $('btn-redraw').addEventListener('click', () => runDivination());
    $('btn-share').addEventListener('click', shareResult);
    $('btn-browse').addEventListener('click', () => {
      renderBrowse();
      showScreen($('screen-browse'));
    });

    // History: exclude toggle
    $('history-list').addEventListener('click', e => {
      const btn = e.target.closest('.h-exclude');
      if (!btn) return;
      toggleExclusion(btn.dataset.id);
      renderHistory();
    });

    // History: clear
    $('history-clear').addEventListener('click', () => {
      localStorage.removeItem('lunchOracleHistory');
      localStorage.removeItem('lunchOracleExclude');
      renderHistory();
    });

    // =============================================
    // INIT
    // =============================================
    renderLangToggle();
    renderHome();
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
  </script>
</body>
</html>
